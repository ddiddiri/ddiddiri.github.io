        <div class="menu4-content3">

                <p>전용 앱을 통해 쉽고 심플한</p>
                <p>피트니스 운영이 가능해집니다.</p>
            </div>
            <div class="menu4-text3-bl">
                <h3>심플한 피트니스 운영</h3>
                <p>전용 앱을 통해 쉽고 심플한</p>

    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="true">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="images/img1.webp" class="d-block w-100" alt="image1">
            </div>
            <div class="carousel-item">
                <img src="images/img2.webp" class="d-block w-100" alt="image2">
            </div>
            <div class="carousel-item">
                <img src="images/img3.webp" class="d-block w-100" alt="image3">
            </div>
            <div class="carousel-item">
                <img src="images/img4.webp" class="d-block w-100" alt="image4">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <script>
        function setEqualHeight() {
            const sections = [{
                    text: document.querySelectorAll('.menu4-text2-bl'),
                    images: document.querySelectorAll('.menu4-img2 img')
                },
                {
                    text: document.querySelectorAll('.menu4-text3-bl, .menu4-text3-wh'),
                    images: document.querySelectorAll('.menu4-img3 img')
                }
            ];

            sections.forEach(section => {
                section.text.forEach((textDiv, index) => {
                    const textHeight = textDiv.offsetHeight;
                    section.images[index].style.height = textHeight + 'px';
                    section.images[index].style.objectFit = 'cover';
                    section.images[index].style.width = '100%';
                });
            });
        }

        window.onload = setEqualHeight;
        window.onresize = setEqualHeight;

    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
